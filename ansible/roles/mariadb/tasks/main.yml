---
- name: Installer MariaDB server et le module Python pour Ansible
  ansible.builtin.apt:
    name:
      - mariadb-server
      - python3-pymysql
    state: present
    update_cache: true

- name: S'assurer que MariaDB tourne et démarre au boot
  ansible.builtin.service:
    name: mariadb
    state: started
    enabled: true

- name: Autoriser MariaDB à écouter sur le réseau (pas seulement localhost)
  ansible.builtin.lineinfile:
    path: /etc/mysql/mariadb.conf.d/50-server.cnf
    regexp: '^bind-address'
    line: 'bind-address = 0.0.0.0'
  notify: Redémarrer MariaDB

- name: Créer la base de test
  community.mysql.mysql_db:
    name: testdb
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock

- name: Créer l'utilisateur dbtools accessible depuis le LXC dbtools (.160)
  community.mysql.mysql_user:
    name: dbtools
    password: "{{ dbtools_db_password }}"
    host: "192.168.1.160"
    priv: "*.*:ALL"
    state: present
    login_unix_socket: /run/mysqld/mysqld.sock
